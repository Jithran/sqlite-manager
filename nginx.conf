server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SQLite WASM requires cross-origin isolation for SharedArrayBuffer
    add_header Cross-Origin-Opener-Policy  "same-origin"   always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # Serve pre-compressed assets when available
    gzip_static on;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived cache for hashed assets (Vite adds content hashes to filenames)
    location ~* \.(?:js|css|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Headers must be repeated inside location blocks
        add_header Cross-Origin-Opener-Policy  "same-origin"   always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }
}
